# 1. Create a dedicated Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: rj-ecommerce-app
---

# 2. Product Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: rj-ecommerce-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-service
        image: your-docker-hub-username/product-service:latest
        ports:
        - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: rj-ecommerce-app
spec:
  selector:
    app: product-service
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
---

# 3. Cart Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: rj-ecommerce-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
      - name: cart-service
        image: your-docker-hub-username/cart-service:latest
        ports:
        - containerPort: 5002
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: rj-ecommerce-app
spec:
  selector:
    app: cart-service
  ports:
    - protocol: TCP
      port: 5002
      targetPort: 5002
---

# 4. Order Service
apiVersion: apps/v1
kind: Deployment
metadata:
