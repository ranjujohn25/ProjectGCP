---

# 5. Gateway (Frontend)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: rj-ecommerce-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: your-docker-hub-username/gateway:latest
        ports:
        - containerPort: 5000
        env:
        # Internal DNS names: http://<service-name>.<namespace>.svc.cluster.local
        - name: PRODUCT_SVC_URL
          value: "http://cluster.local"
        - name: CART_SVC_URL
          value: "http://cluster.local"
        - name: ORDER_SVC_URL
          value: "http://cluster.local"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: rj-ecommerce-app
spec:
  type: LoadBalancer # Exposes the frontend to the internet
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
