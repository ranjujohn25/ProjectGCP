# 1. Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: rj-ecommerce-app
---
# 2. Network Policy: Full Open Access
# This explicitly allows all traffic to/from all pods in this namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-traffic
  namespace: rj-ecommerce-app
spec:
  podSelector: {} # Matches all pods
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {} # Allows all incoming traffic
  egress:
  - {} # Allows all outgoing traffic
---
# 3. Product Service (Deployment + Service)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: rj-ecommerce-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-service
        image: your-docker-hub/product-service:latest
        ports:
        - containerPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: rj-ecommerce-app
spec:
  type: ClusterIP
  selector:
    app: product-service
  ports:
  - port: 5001
    targetPort: 5001
---
# 4. Cart Service (Deployment + Service)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: rj-ecommerce-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
      - name: cart-service
        image: your-docker-hub/cart-service:latest
        ports:
        - containerPort: 5002
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: rj-ecommerce-app
spec:
  type: ClusterIP
  selector:
    app: cart-service
  ports:
  - port: 5002
    targetPort: 5002
---
# 5. Order Service (Deployment + Service)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: rj-ecommerce-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: your-docker-hub/order-service:latest
        ports:
        - containerPort: 5003
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: rj-ecommerce-app
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
  - port: 5003
    targetPort: 5003
---
# 6. Gateway / Frontend (Deployment + Service)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: rj-ecommerce-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: your-docker-hub/gateway:latest
        ports:
        - containerPort: 5000
        env:
        - name: PRODUCT_SVC_URL
          value: "http://product-service:5001"
        - name: CART_SVC_URL
          value: "http://cart-service:5002"
        - name: ORDER_SVC_URL
          value: "http://order-service:5003"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: rj-ecommerce-app
spec:
  type: LoadBalancer # Exposes the app to the internet
  selector:
    app: gateway
  ports:
  - port: 80
    targetPort: 5000
